name: ML Training CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ========================================
      # BASIC: Setup Environment
      # ========================================
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Environment
        run: |
          echo "=== Python ==="
          python --version
          echo "=== Pip ==="
          pip --version
          echo "=== Docker ==="
          docker --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow dagshub matplotlib seaborn

      # ========================================
      # BASIC: Run MLflow Project
      # ========================================
      - name: Run MLflow Project
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          RUN_ID=$(cat MLProject/run_id.txt)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Latest Run ID: $RUN_ID"

      # ========================================
      # SKILLED: Upload Artifacts
      # ========================================
      - name: Upload ML Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: ml-model-artifacts
          path: |
            MLProject/confusion_matrix.png
            MLProject/feature_importance.png
            MLProject/classification_report.json
            MLProject/saved_model/

      # ========================================
      # ADVANCED: Build & Push Docker Image
      # ========================================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image with MLflow
        run: |
          mlflow models build-docker \
            -m "MLProject/saved_model" \
            -n "muhammadhabibna/fraud-detection-model"

      - name: Push Docker Image to Docker Hub
        run: |
          docker push muhammadhabibna/fraud-detection-model:latest
